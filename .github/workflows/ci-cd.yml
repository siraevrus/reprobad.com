# Деплой на прод после push в master (и вручную: Actions → Deploy production → Run workflow).
#
# Secrets (Settings → Secrets and variables → Actions):
#   HOST       — IP или хост сервера (например 45.131.41.102)
#   USERNAME   — SSH-пользователь (например root)
#   SSH_KEY    — приватный ключ (полное содержимое id_rsa / ed25519)
#
# Опционально:
#   SSH_PORT   — если пусто, используется 22
#
# Environments → production: можно включить required reviewers для подтверждения деплоя.
#
# На сервере один раз: репозиторий в /var/www/repro, доступ по ключу, chmod +x server-update.sh

name: Deploy production

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          # Включите при отладке SSH: подробный лог подключения
          debug: false
          # port: по умолчанию 22; для другого порта раскомментируйте и задайте secrets.SSH_PORT
          # port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            echo "=== Кто выполняет деплой: $(whoami) ($(id -u)) ==="
            echo "=== php: $(command -v php 2>/dev/null || echo 'нет в PATH') ==="
            echo "=== composer: $(command -v composer 2>/dev/null || echo 'нет в PATH') ==="

            cd /var/www/repro

            echo "=== Git: убрать неотслеживаемые файлы, мешающие merge ==="
            U=$(git status --porcelain 2>/dev/null | grep '^??' | awk '{print $2}' | grep -E '(left-arrow\.svg|right-arrow\.svg|deployment/git-hooks/post-merge\.example|deployment/php-fpm-opcache-revalidate\.ini\.example|deployment/GITHUB_ACTIONS_DEPLOY_SCRIPT\.yml)' || true)
            if [[ -n "$U" ]]; then
              while IFS= read -r file; do
                [[ -z "$file" ]] && continue
                if [[ -f "$file" ]]; then
                  echo "Удаление неотслеживаемого: $file"
                  rm -f "$file"
                fi
              done <<< "$U"
            fi

            echo "=== Git: stash / pull master ==="
            git stash push -m "github-actions-pre-pull-$(date +%s)" 2>/dev/null || true
            git fetch origin
            git pull origin master

            echo "=== Laravel: composer, migrate, caches, php-fpm, sitemap ==="
            chmod +x server-update.sh 2>/dev/null || true
            bash ./server-update.sh --skip-pull

            echo "=== Smoke check ==="
            php artisan --version
            php artisan migrate:status --no-interaction | tail -n 5

            echo "✅ Деплой завершён"
