name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, pdo_mysql, dom, filter, gd, iconv, json, mbstring, pdo, xml, zip

    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader

    - name: Create deployment package
      run: |
        tar -czf deployment.tar.gz \
          --warning=no-file-changed \
          --exclude='.git' \
          --exclude='node_modules' \
          --exclude='tests' \
          --exclude='.github' \
          --exclude='.env.example' \
          --exclude='README.md' \
          --exclude='CHANGELOG.md' \
          --exclude='phpunit.xml' \
          --exclude='tailwind.config.js' \
          --exclude='vite.config.js' \
          --exclude='package.json' \
          --exclude='package-lock.json' \
          .

    - name: Upload deployment package
      uses: actions/upload-artifact@v4
      with:
        name: deployment-package
        path: deployment.tar.gz

    - name: Deploy to server
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          cd /var/www/your-app
          
          # Создание бэкапа перед деплоем
          echo "Создание бэкапа..."
          tar -czf backup-$(date +%Y%m%d-%H%M%S).tar.gz --exclude='storage/logs/*' --exclude='storage/framework/cache/*' .
          
          # Проверка статуса приложения
          echo "Проверка статуса приложения..."
          php artisan --version
          
          # Безопасный git pull
          echo "Получение изменений из git..."
          git stash
          git pull origin master
          
          # Установка зависимостей
          echo "Установка зависимостей..."
          composer install --no-dev --optimize-autoloader --no-interaction
          
          # Проверка миграций перед запуском
          echo "Проверка миграций..."
          php artisan migrate:status
          
          # Безопасный запуск миграций
          echo "Запуск миграций..."
          php artisan migrate --force
          
          # Очистка кэша
          echo "Очистка кэша..."
          php artisan cache:clear
          php artisan config:clear
          
          # Проверка что всё работает
          echo "Проверка приложения..."
          php artisan route:list --compact
          
          echo "Деплой завершен успешно!" 