name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, pdo_mysql, dom, filter, gd, iconv, json, mbstring, pdo, xml, zip

    - name: Deploy to server
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          cd /var/www/repro

          # Проверка статуса приложения
          echo "Проверка статуса приложения..."
          php artisan --version

          # Безопасный git pull
          echo "Получение изменений из git..."
          git stash
          git pull origin master

          # Проверка миграций перед запуском
          echo "Проверка миграций..."
          php artisan migrate:status

          # Безопасный запуск миграций
          echo "Запуск миграций..."
          php artisan migrate --force

          # Очистка кэша
          echo "Очистка кэша..."
          php artisan cache:clear
          php artisan config:clear
          php artisan view:clear
          php artisan route:clear
          php artisan route:cache

          # Перезапуск PHP-FPM для сброса OPcache
          echo "Перезапуск PHP-FPM..."
          systemctl restart php8.4-fpm
          echo "✅ PHP-FPM перезапущен, OPcache сброшен"

          # Генерация sitemap.xml
          echo "Генерация sitemap.xml..."
          php artisan sitemap:generate

          # Проверка настроек cron для Laravel Scheduler
          echo "Проверка настроек cron..."
          CRON_CHECK=$(crontab -l 2>/dev/null | grep -c "schedule:run" || echo "0")
          if [ "$CRON_CHECK" -eq "0" ]; then
            echo "⚠️  ВНИМАНИЕ: Laravel Scheduler (cron) не настроен!"
            echo "   Для настройки выполните на сервере:"
            echo "   crontab -e"
            echo "   Добавьте: * * * * * cd /var/www/repro && php artisan schedule:run >> /dev/null 2>&1"
          else
            echo "✅ Laravel Scheduler (cron) настроен корректно"
            crontab -l 2>/dev/null | grep "schedule:run"
          fi

          # Проверка что всё работает
          echo "Проверка приложения..."
          php artisan route:list | head -20

          echo "Деплой завершен успешно!"
