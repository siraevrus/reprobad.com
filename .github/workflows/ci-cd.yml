name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, pdo_mysql, dom, filter, gd, iconv, json, mbstring, pdo, xml, zip

    - name: Deploy to server
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          cd /var/www/repro

          # Проверка статуса приложения
          echo "Проверка статуса приложения..."
          php artisan --version

          # Безопасный git pull
          echo "Получение изменений из git..."
          git stash
          git pull origin master

          # Проверка миграций перед запуском
          echo "Проверка миграций..."
          php artisan migrate:status

          # Безопасный запуск миграций
          echo "Запуск миграций..."
          php artisan migrate --force

          # Очистка кэша
          echo "Очистка кэша..."
          php artisan cache:clear
          php artisan config:clear
          php artisan view:clear
          php artisan route:cache

          # Генерация sitemap.xml
          echo "Генерация sitemap.xml..."
          php artisan sitemap:generate

          # Проверка что всё работает
          echo "Проверка приложения..."
          php artisan route:list --compact

          echo "Деплой завершен успешно!"
